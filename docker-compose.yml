services:

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: progettoitai-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: progettoitai-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    environment:
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s